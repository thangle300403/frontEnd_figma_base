<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login UI</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="card">
    <img class="bg-vec" src="./images/Vector (3).png" />


    <!-- LEFT -->
    <div class="left">
      <img class="corner-decor" src="./images/Group 6.png" />

      <!-- ARTWORK -->
      <img class="bg-rec" src="./images/Rectangle.png" />
      <img class="bg-decor" src="./images/Group 4.png" />
      <img class="bg-mess2" src="./images/Group 2.png" />
      <img class="bg-mess1" src="./images/Group 1.png" />

      <!-- TEXT -->
      <p class="left-title">Turn your ideas into reality.</p>
      <p class="left-sub">
        Start for free and get attractive offers from the community
      </p>
    </div>



    <!-- RIGHT -->
    <div class="right">
      <img class="group-876" src="./images/Group 1686550876.png" />
      <div class="login-block">
        <h3>Login to your Account</h3>
        <span class="sub">See what is going on with your business</span>

        <button class="google-btn">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg" />
          Continue with Google
        </button>

        <div class="divider">-----------or Sign in with Email-----------</div>

        <form>
          <label>Email</label>
          <input type="email" id="email" placeholder="mail@abc.com" />
          <p class="error" id="email-error"></p>

          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" />
          <p class="error" id="password-error"></p>

          <div class="row">
            <label class="remember">
              <input type="checkbox" />
              Remember Me
            </label>
            <a href="#">Forgot Password?</a>
          </div>

          <button class="login-btn" type="submit">Login</button>
        </form>
      </div>

      <div class="right-register">
        <span>Not Registered Yet?</span>
        <a href="#">Create an Account</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
