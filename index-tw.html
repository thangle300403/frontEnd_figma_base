<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login UI TW</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: "Nunito Sans", sans-serif;
    }
  </style>
</head>

<body class="min-h-screen bg-gray-100 flex items-center justify-center px-4">

  <!-- CARD -->
  <div class="bg-white rounded-2xl shadow-xl
           w-full max-w-[420px]
           lg:max-w-[1920px] lg:h-[1080px]
           flex flex-col lg:flex-row
           overflow-hidden relative">

    <!-- LEFT (Desktop only) -->
    <div class="hidden min-[1636px]:flex w-[1109px] bg-[#FFE6C9] relative justify-center">
      <!-- DECOR -->
      <img src="./images/Group 6.png" class="absolute left-[-69px] top-[-60px] w-[297px]" />
      <img src="./images/Rectangle.png" class="absolute left-[263px] top-[179px] w-[593px]" />
      <img src="./images/Group 4.png" class="absolute left-[305px] top-[320px] w-[499px]" />
      <img src="./images/Group 2.png" class="absolute left-[240px] top-[400px] w-[181px]" />
      <img src="./images/Group 1.png" class="absolute left-[722px] top-[420px] w-[196px]" />

      <!-- TEXT -->
      <p class="absolute text-[40px] top-[913px] left-[295px] font-extrabold text-[#73114B] leading-none">
        Turn your ideas into reality.
      </p>
      <p class="absolute text-[25px] top-[968px] left-[223px]  font-semibold text-[#73114B] leading-none">
        Start for free and get attractive offers from the community
      </p>
    </div>

    <!-- RIGHT -->
    <div class="flex-1 p-6 lg:p-10
             flex 
            justify-center relative">

      <!-- LOGO (desktop) -->
      <img src="./images/Group 1686550876.png" class="hidden lg:block absolute top-[179px] left-[201px]" />

      <!-- FORM -->
      <form class="lg:absolute w-full max-w-[420px] lg:top-[287px]" data-login-form>

        <h1 class="text-[28px] lg:text-[36px] font-bold text-[#525252] mb-[3px]">
          Login to your Account
        </h1>
        <p class="text-sm lg:text-[16px] text-[#525252] mb-6 lg:mb-8">
          See what is going on with your business
        </p>

        <!-- GOOGLE -->
        <button type="button" class="w-full h-[45px] flex items-center justify-center gap-3
                 bg-white border border-gray-300 rounded-md
                 text-sm font-semibold hover:bg-gray-50 transition mb-6 lg:mb-0">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" />
          Continue with Google
        </button>

        <p class="text-xs font-semibold text-[#A1A1A1] text-center mb-6 lg:mb-9 lg:mt-9">
          — or Sign in with Email —
        </p>

        <!-- EMAIL -->
        <label class="text-sm font-semibold text-[#A1A1A1]">Email</label>
        <input name="email" type="email" placeholder="mail@abc.com" class="w-full h-[45px] px-4
                 border border-gray-300 rounded-md
                 focus:outline-none focus:ring-2 focus:ring-blue-500  mb-6" />
        <p class="error-email text-red-500 text-[12px] hidden"></p>

        <!-- PASSWORD -->
        <label class="text-sm font-semibold text-[#A1A1A1]">Password</label>
        <input name="password" type="password" placeholder="••••••••" class="w-full h-[45px] px-4 mb-2
                 border border-gray-300 rounded-md
                 focus:outline-none focus:ring-2 focus:ring-blue-500" />
        <p class="error-password text-red-500 text-[12px] hidden"></p>

        <!-- OPTIONS -->
        <div class="flex items-center justify-between text-sm mb-8">
          <label class="flex items-center gap-2 text-gray-600">
            <input type="checkbox" />
            Remember Me
          </label>
          <a href="#" class="text-blue-600 hover:underline">
            Forgot Password?
          </a>
        </div>

        <!-- LOGIN -->
        <button type="submit" class="w-full h-[50px]
                 bg-[#7F265B] text-white rounded-md
                 text-lg font-extrabold
                 hover:bg-[#6A1F4E] transition">
          Login
        </button>
      </form>

      <p class="absolute text-center justify-center text-[18px] text-[#A1A1A1] top-[980px]">
        Not registered yet?
        <a href="#" class="text-blue-600 hover:underline ml-1">
          Create account
        </a>
      </p>
    </div>

    <!-- DECOR bottom -->
    <img src="./images/Vector (3).png" class="hidden lg:block absolute left-[1025.5px] bottom-[0px] w-[167px]" />

  </div>

  <script src="./scrypt.js"></script>
</body>

</html>
